<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antecessor e Sucessor</title>
</head>
<body>
    <script>
        let numero1= Number(prompt("Digite um número: "))
        let anterior= numero1 - 1
        let proximo= numero1 + 1
            console.log(anterior)
            console.log(proximo)

            document.write(`O Antecessor de ${numero1} é ${anterior} <br> `)
            document.write(`O Sucessor de ${numero1} é ${proximo}`)
    </script>
</body>
</html>
