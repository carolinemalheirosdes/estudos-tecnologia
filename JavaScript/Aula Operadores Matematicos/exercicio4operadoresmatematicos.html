<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salário mensal e Bonus</title>
</head>
<body>
    <script>
        let salario= Number(prompt("Digite o valor do salário do colaborador: "))
        let bonus= Number(prompt("Digite o valor do bonus desse mês: "))
        let soma= salario + bonus
            console.log(soma)

            document.write(`O salário do colaborador para o mês de maio é de ${soma}`)
    </script>
