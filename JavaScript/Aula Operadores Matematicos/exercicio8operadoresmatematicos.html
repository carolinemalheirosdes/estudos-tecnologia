<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantos Kilometros faz o corsa por litro</title>
</head>
<body>
    <script>
        let distancia= Number(prompt("Digite a distancia que percorreu: "))
        let litro= Number (prompt("Quantos litros usou: ")) 
        let formula= distancia / litro
            console.log(formula)

            document.write(`O corsa faz ${formula} km por litro de gasolina`)
    </script>
</body>
</html>
