<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini calculadora</title>
</head>
<body>
    <script>
        let numero1= Number(prompt("Digite um numero: "))
        let numero2= Number(prompt("Digite outro numero: "))
        let soma= numero1 + numero2
        let subt= numero1 - numero2
        let divisao= numero1 / numero2
        let mult= numero1 * numero2
        let pot= numero1 ** numero2
        let rest= numero1 % numero2

            console.log(soma)
            console.log(subt)
            console.log(divisao)
            console.log(mult)
            console.log(pot)
            console.log(rest)

            document.write(`Mini calculadora <br>`)
            document.write(`Soma: ${soma} <br>`)
            document.write(`Subtração: ${subt} <br>`)
            document.write(`Divisão: ${divisao} <br>`)
            document.write(`Multiplicação: ${mult} <br>`)
            document.write(`Potencia: ${pot} <br>`)
            document.write(`Resto da divisao: ${rest} <br>`)
    </script>
</body>
</html>>
