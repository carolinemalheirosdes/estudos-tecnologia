<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média de notas</title>
</head>
<body>
    <script>
        let numero1= Number(prompt("Digite a nota do aluno no 1ºBim: "))
        let numero2= Number(prompt("Digite a nota do aluno no 2ºBim: "))
        let media= (numero1+numero2) /2
            console.log(media)

        document.write(`<h2> Média dos Alunos 1º e 2º Bimestre<h2> <br>`)
        document.write(`Nota 1ºBim: ${numero1} <br>`)
        document.write(`Nota 2ºBim: ${numero2} <br>`)
        document.write(`A média desse Aluno é nota ${media} `)
    </script>
</body>
</html>
