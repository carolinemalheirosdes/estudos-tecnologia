<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobro ou triplo</title>
</head>
<body>
    <script>
        let numero1= Number (prompt("Digite um numero para ver seu dobro e seu triplo: "))
        let dobro= numero1 * 2
        let triplo= numero1 * 3
            console.log(dobro)
            console.log(triplo)

            document.write(`O dobro de ${numero1} é ${dobro} <br> `)
            document.write(`O triplo de ${numero1} é ${triplo}`)
    </script>
</body>
</html>>
