<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro cliente</title>
</head>
<body>
    <form>
        <fieldset>
            <legend> Dados Pessoais </legend>
            <label> Nome: </label>
            <input type="text">
            <br><br>
            <label> Email: </label>
            <input type="text">
            <br><br>
            <label> Tel.     : </label>
            <input type="text">
            <br><br>
            <label> Cidade: </label>
            <input type="text">
            
            <label> Estado: </label>
            <select>
                <option> Selecione </option>
                <option> São Paulo </option>
                <option> Minas Gerais </option>
                <option> Bahia </option>
            </select>
        </fieldset>
        
        <br>

        <fieldset>
            <legend> Interesses </legend>

            <input type="checkbox"> Roupas Femininas </input>
            <br>
            <input type="checkbox"> Roupas Masculinas </input>
            <br>
            <input type="checkbox"> Calçados</input>
            <br>
            <input type="checkbox"> Acessórios </input>
            <br>
            <input type="checkbox"> Outros (escreva abaixo): </input><br>
            <textarea cols="50"></textarea>
        </fieldset>
        <br><br>
        <button> Enviar </button>
    </form>
</body>
</html>
