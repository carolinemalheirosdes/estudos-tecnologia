<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- Header Representa o cabeçalho da página.-->
     <header>

    <h1>Angelis Store </h1>
    </header>

    <!-- Nav Representa a navegação. -->
    <nav>
    <a href="#">Início</a>
    <a href="#">Produtos</a>
    <a href="#">Contato</a>
    </nav>
    <!-- Quando tiver outras paginas -->
     <nav>
    <a href="index.html">Início</a>
    <a href="produtos.html">Produtos</a>
    <a href="sobre.html">Sobre</a>
    <a href="contato.html">Contato</a>
    </nav>

    <!-- Main Representa o conteúdo principal Cada página deve possuir apenas um <main>-->
    <main>
    <h2>Bem-vindo!</h2>
    <p>Esta é minha loja virtual.</p>
    </main>

    <!-- Section Divide o conteúdo em seções-->
     <section>
    <h2>Moda Feminina</h2>
    <p>Confira nossos produtos.</p>
    </section>

    <!--Article Representa um conteúdo independente. Muito usado para: Notícias, Blog, Produtos, Publicações -->
    <article>
    <h3>Bolsa Feminina</h3>
    <p>Bolsa em couro ecológico.</p>
    </article>

    <!-- Aside Conteúdo complementar. Exemplos: Propaganda, Promoções, Produtos relacionados-->
    <aside>
    <h3>Promoção</h3>
    <p>Frete grátis acima de R$199.</p>
    </aside>

    <!-- Footer Rodapé da página. Normalmente contém: Direitos autorais, Redes sociais, Contato, Endereço-->
    <footer>
    <p>© 2026 Angelis Store</p>
    </footer>

</body>
</html>
