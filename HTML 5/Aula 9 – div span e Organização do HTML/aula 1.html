<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
</head>
<body>

    <!-- Div organiza o código -->
    
    <div>
        <h2>Moda Feminina</h2>
        <p>Vestidos, blusas e calças.</p>
    </div>

    <!-- Span destaca uma pequena parte do texto -->
    
    <p>
        Meu nome é <span>Caroline</span>.
    </p>

    <!-- Elementos do bloco ocupam toda largura disponível -->
    <h1>
    <p>
    <div>
    <header>
    <section>
    <footer>
    <table>

    <!-- Elementos em linha ocupa apenas o espaço necessário -->
    
    <a>
    <span>
    <strong>
    <em>
    <u>
    <img>

    <!-- atributo O id identifica um elemento de forma única. -->

        <div id="Principal"></div> // Cada id deve ser usado apenas uma vez na página.


    <!-- atributo class identifica um grupo de elementos. -->

    <div class="Produto"></div>
    <div class="Categorias"></div> // Depois o CSS poderá estilizar todos os produtos ao mesmo tempo.

    <!-- Lembrando que id deve ser usado apenas uma vez na página  e  class mais de uma -->
</body>
</html>>
