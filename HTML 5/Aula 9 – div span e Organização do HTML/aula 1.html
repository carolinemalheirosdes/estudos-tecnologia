<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
</head>
<body>

    <!-- Div organiza o código -->
    
    <div>
        <h2>Moda Feminina</h2>
        <p>Vestidos, blusas e calças.</p>
    </div>

    <!-- Span destaca uma pequena parte do texto -->
    
    <p>
        Meu nome é <span>Caroline</span>.
    </p>

    
</body>
</html>>
