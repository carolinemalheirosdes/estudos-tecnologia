exemplo completo
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela</title>
</head>

<body>

    <h1>Alunos</h1>

    <table border="1">

        <tr>
            <th>Nome</th>
            <th>Idade</th>
            <th>Cidade</th>
        </tr>

        <tr>
            <td>Caroline</td>
            <td>30</td>
            <td>São Paulo</td>
        </tr>

        <tr>
            <td>João</td>
            <td>25</td>
            <td>Campinas</td>
        </tr>

    </table>

</body>
</html>
