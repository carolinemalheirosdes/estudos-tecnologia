<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Inserindo imagens </title>
</head>
<body>
    <!-- Inserindo imagens diratamente -->
     <img src="imagem.jpg">

    <!-- Inserindo Imagens com texto alternativo -->
     <img src="gato.jpg" alt="Foto de um gato">

    <!-- Inserindo imagens definindo tamanho -->
     <img
    src="gato.jpg"
    alt="Gato"
    width="300"
    height="200"
    >

</body>
</html>
